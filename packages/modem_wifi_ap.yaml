external_components:
  - source: github://pr#7147
    components: [wifi]
    refresh: 10min

wifi:
  ap:
    ssid: mymodem
    password: mypassword

modem: 
  on_connect:
    - logger.log: "restarting wifi dhcp server to use modem interface"
    - lambda: |-
        esphome::wifi::global_wifi_component->wifi_ap_nat(id(atmodem)->modem_handler->ppp_netif);
    