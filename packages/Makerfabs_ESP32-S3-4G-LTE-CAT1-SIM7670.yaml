esphome:
  name: makerfabs-7670
  on_boot: 
    then:
      - script.execute: modem_on

esp32:
  variant: esp32s3

modem:
  id: atmodem
  model: SIM7670
  rx_pin: GPIO47
  tx_pin: GPIO48
  on_sync:
    modem.send_at: AT+CGNSSPWR=1

# ton/toff values from https://nostris.ee/pdf/A7670%20Series%20Hardware%20Design_V1.00.pdf
# p 26-27
script:
  - id: modem_on
    mode: single
    then:
      - logger.log: modem POWERON begin...
      - switch.turn_on: modem_power
      - delay: 50ms
      - switch.turn_off: modem_power
      - delay: 12s
      - logger.log: modem POWERON done

  - id: modem_off
    mode: single
    then:
      - logger.log: modem POWEROFF begin...
      - switch.turn_on: modem_power
      - delay: 2700ms
      - switch.turn_off: modem_power
      - delay: 2s
      - logger.log: modem POWEROFF done

switch:
  - platform: gpio
    # When high, no network connection to the modem, even for basic AT commands
    id: modem_flight_mode
    pin: GPIO05
  - platform: gpio
    id: modem_power
    pin: 
      number: GPIO04



gps:
  uart_id: atmodem
  id: gps_id
  latitude:
    name: "Latitude"
  longitude:
    name: "Longitude"
  altitude:
    name: "Altitude"
  update_interval: never

interval:
  - interval: 20s
    then:
      - lambda: |-
          auto gnssinfo_result = id(atmodem).send_at("AT+CGNSSINFO");
          if(!gnssinfo_result.success) {
            ESP_LOGW("GNSS", "unable to execute AT+CGNSSINFO");
            return;

          }
          if (gnssinfo_result.output.find("+CGNSSINFO:") == std::string::npos) {
            ESP_LOGI("GNSS", "No output");
            return;
          }

          auto checksum = [](const std::string &s) -> uint8_t {
            uint8_t cs = 0;
            for (char c : s) cs ^= static_cast<uint8_t>(c);
            return cs;
          };

          auto split_csv = [](const std::string &s) {
            std::vector<std::string> out;
            size_t start = 0;
            while (true) {
              size_t pos = s.find(',', start);
              if (pos == std::string::npos) {
                out.push_back(s.substr(start));
                break;
              }
              out.push_back(s.substr(start, pos - start));
              start = pos + 1;
            }
            return out;
          };

          auto to_double = [](const std::string &s) -> double {
            return s.empty() ? NAN : atof(s.c_str());
          };

          auto to_int = [](const std::string &s) -> int {
            return s.empty() ? 0 : atoi(s.c_str());
          };

          auto decdeg_to_nmea = [](double deg, bool is_lat) -> std::string {
            if (!std::isfinite(deg)) return "";
            double a = fabs(deg);
            int d = (int) floor(a);
            double m = (a - d) * 60.0;
            char buf[24];
            if (is_lat) {
              snprintf(buf, sizeof(buf), "%02d%07.4f", d, m);
            } else {
              snprintf(buf, sizeof(buf), "%03d%07.4f", d, m);
            }
            return std::string(buf);
          };

          size_t colon = gnssinfo_result.output.find(':');
          if (colon == std::string::npos) return;
          std::string body = gnssinfo_result.output.substr(colon + 1);
          while (!body.empty() && body[0] == ' ') body.erase(0, 1);

          auto p = split_csv(body);
          if (p.size() == 17) {
            // on waveshare 7670 last field is sometime missing
            ESP_LOGW("NMEA", "Added missing 'sat_used' field");
            p.push_back("");
          }
          if (p.size() < 18) {
            ESP_LOGW("NMEA", "CGNSSINFO malformed: %s", gnssinfo_result.output.c_str());
            return;
          }

          ESP_LOGD("NMEA", "CGNSSINFO OK: %s", gnssinfo_result.output.c_str());

          double lat = to_double(p[5]);
          std::string lat_dir = p[6].empty() ? "N" : p[6];
          double lon = to_double(p[7]);
          std::string lon_dir = p[8].empty() ? "E" : p[8];
          std::string date_str = p[9];
          std::string time_str = p[10];
          double alt_m = to_double(p[11]);
          double spd = to_double(p[12]);
          double cog = to_double(p[13]);
          double hdop = to_double(p[15]);
          int sat_used = to_int(p[17]);

          std::string lat_ddmm = decdeg_to_nmea(lat, true);
          std::string lon_ddmm = decdeg_to_nmea(lon, false);

          bool valid = !lat_ddmm.empty() && !lon_ddmm.empty() &&
                       !date_str.empty() && !time_str.empty();

          int fix_quality = valid ? 1 : 0;
          char sat_str[4];
          snprintf(sat_str, sizeof(sat_str), "%02d", sat_used > 99 ? 99 : sat_used);

          char gga[160];
          snprintf(
            gga, sizeof(gga),
            "GPGGA,%s,%s,%c,%s,%c,%d,%s,%.1f,%.1f,M,,M,,",
            time_str.c_str(),
            lat_ddmm.c_str(), lat_dir[0],
            lon_ddmm.c_str(), lon_dir[0],
            fix_quality,
            sat_str,
            std::isfinite(hdop) ? hdop : 0.0,
            std::isfinite(alt_m) ? alt_m : 0.0
          );

          char rmc[160];
          snprintf(
            rmc, sizeof(rmc),
            "GPRMC,%s,%c,%s,%c,%s,%c,%.1f,%.1f,%s,,,",
            time_str.c_str(),
            valid ? 'A' : 'V',
            lat_ddmm.c_str(), lat_dir[0],
            lon_ddmm.c_str(), lon_dir[0],
            std::isfinite(spd) ? spd : 0.0,
            std::isfinite(cog) ? cog : 0.0,
            date_str.c_str()
          );

          char full_gga[176];
          char full_rmc[176];
          snprintf(full_gga, sizeof(full_gga), "$%s*%02X\r\n", gga, checksum(gga));
          snprintf(full_rmc, sizeof(full_rmc), "$%s*%02X\r\n", rmc, checksum(rmc));

          ESP_LOGI("NMEA", "GGA: %s", full_gga);
          ESP_LOGI("NMEA", "RMC: %s", full_rmc);

          id(atmodem)->write_array((const uint8_t *) full_gga, strlen(full_gga));
          id(atmodem)->write_array((const uint8_t *) full_rmc, strlen(full_rmc));
          id(gps_id)->update();

